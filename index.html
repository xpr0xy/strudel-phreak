<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>strudel phreak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --text: #cdd6f4;
      --muted: #6c7086;
      --accent: #cba6f7;
      --accent2: #89b4fa;
      --green: #a6e3a1;
      --red: #f38ba8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo h1 {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo .tag {
      font-size: 9px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
    }

    .presets {
      display: flex;
      gap: 4px;
    }

    .presets button {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--muted);
      padding: 5px 12px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .presets button:hover, .presets button.active {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--bg);
    }

    .main {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    iframe#repl {
      position: absolute;
      inset: 0;
      border: none;
      width: 100%;
      height: 100%;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 10px;
      flex-shrink: 0;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @media (max-width: 640px) {
      header { padding: 8px 12px; }
      .logo h1 { font-size: 12px; }
      .presets { width: 100%; justify-content: stretch; }
      .presets button { flex: 1; padding: 8px 4px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <h1>strudel phreak</h1>
      <span class="tag">v0.4</span>
    </div>
    <div class="presets">
      <button onclick="loadPreset('deephouse')" id="btn-deephouse" class="active">deep house</button>
      <button onclick="loadPreset('breakcore')" id="btn-breakcore">breakcore</button>
      <button onclick="loadPreset('acid')" id="btn-acid">acid</button>
      <button onclick="loadPreset('ambient')" id="btn-ambient">ambient</button>
    </div>
  </header>

  <div class="main">
    <iframe id="repl" allow="autoplay" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
  </div>

  <div class="status-bar">
    <div class="status-left">
      <div class="status-indicator">
        <div class="dot"></div>
        <span>strudel.cc repl — hit play or ctrl+enter</span>
      </div>
    </div>
  </div>

    function loadPreset(name) {
      document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + name).classList.add('active');

      const container = document.querySelector('.main');
      const oldIframe = document.getElementById('repl');
      if (oldIframe) oldIframe.remove();

      const newIframe = document.createElement('iframe');
      newIframe.id = 'repl';
      newIframe.allow = 'autoplay';
      newIframe.sandbox = 'allow-scripts allow-same-origin allow-popups';
      newIframe.src = presets[name];
      container.appendChild(newIframe);
    }

    loadPreset('deephouse');
  </script>
</body>
</html>
