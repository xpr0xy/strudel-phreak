<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>strudel phreak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --text: #cdd6f4;
      --muted: #6c7086;
      --accent: #cba6f7;
      --accent2: #89b4fa;
      --green: #a6e3a1;
      --red: #f38ba8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo h1 {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo .tag {
      font-size: 9px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
    }

    .presets {
      display: flex;
      gap: 4px;
    }

    .presets button {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--muted);
      padding: 5px 12px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .presets button:hover, .presets button.active {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--bg);
    }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    iframe#repl {
      flex: 1;
      border: none;
      width: 100%;
      min-height: 0;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 10px;
      flex-shrink: 0;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @media (max-width: 640px) {
      header { padding: 8px 12px; }
      .logo h1 { font-size: 12px; }
      .presets { width: 100%; justify-content: stretch; }
      .presets button { flex: 1; padding: 8px 4px; font-size: 10px; }
      .status-right { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <h1>strudel phreak</h1>
      <span class="tag">v0.3</span>
    </div>
    <div class="presets">
      <button onclick="loadPreset('deephouse')" id="btn-deephouse" class="active">deep house</button>
      <button onclick="loadPreset('breakcore')" id="btn-breakcore">breakcore</button>
      <button onclick="loadPreset('acid')" id="btn-acid">acid</button>
      <button onclick="loadPreset('ambient')" id="btn-ambient">ambient</button>
    </div>
  </header>

  <div class="main">
    <iframe id="repl" allow="autoplay" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
  </div>

  <div class="status-bar">
    <div class="status-left">
      <div class="status-indicator">
        <div class="dot"></div>
        <span>strudel.cc repl — ctrl+enter to eval</span>
      </div>
    </div>
  </div>

  <script>
    // Presets as base64-encoded code for URL embedding
    const presets = {
      deephouse: `// deep house groove
stack(
  s("bd ~ ~ ~").gain(1.2),
  s("~ ~ hh ~").fast(2).gain(0.55).pan("<-0.3 0.3>"),
  s("~ ~ ~ oh").gain(0.45).room(0.3),
  note("c2 ~ eb2 ~").sound("sawtooth").lpf(sine.range(200, 1200).slow(8)).gain(0.8),
  note("<[c3,eb3,g3,b3] ~ [f3,ab3,c4,eb4] ~>").sound("sine").lpf(800).room(0.4).gain(0.45).slow(2),
  s("~ ~ ~ sd").every(4, rev).gain(0.55)
)`,

      breakcore: `// breakcore chaos
stack(
  s("bd sd [hh hh] sd").fast(4).gain(0.9).lpf(sine.range(400, 4000).fast(2)),
  note("c1 c1 g1 ab1").fast(2).sound("sawtooth").lpf(200).gain(1),
  note("c5 e5 g5 bb5 c6").fast(2).every(3, rev).sound("square").lpf(2000).gain(0.35),
  s("bd(3,8)").gain(0.8).speed("<1 2 0.5 -1>").every(2, fast(2))
)`,

      acid: `// 303 acid
stack(
  s("bd ~ ~ ~").gain(1.1),
  s("~ hh ~ hh").gain(0.5).pan("<-0.5 0.5>"),
  note("<c2 [c2 eb2] g2 [bb2 c3]>").sound("sawtooth").lpf(sine.range(200, 3000).fast(2)).resonance(12).gain(0.9),
  note("c1 ~ ~ c1").sound("sine").gain(0.7),
  note("<~ [c4,eb4,g4] ~ ~>").sound("square").lpf(1200).gain(0.3).room(0.5)
)`,

      ambient: `// deep ambient
stack(
  note("<[c3,e3,g3,b3] [f3,a3,c4,e4]>").sound("sine").slow(4).room(0.8).gain(0.25),
  note("c5").sound("sine").lpf(sine.range(200, 2000).slow(16)).gain(sine.range(0.04, 0.15)).pan(sine.range(-1, 1).slow(8)),
  note("c1").sound("sine").slow(8).gain(0.35),
  s("white").gain(sine.range(0, 0.06).fast(32)).hpf(4000).pan("<-1 -0.5 0 0.5 1>").slow(2),
  note("<c5 ~ ~ e5 ~ g5 ~ ~>").sound("triangle").slow(2).gain(0.15).room(0.9).lpf(1500)
)`
    };

    function encodeForUrl(code) {
      return btoa(unescape(encodeURIComponent(code)));
    }

    function loadPreset(name) {
      // Update button states
      document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + name).classList.add('active');

      // Load in iframe via strudel.cc URL with encoded code
      const encoded = encodeForUrl(presets[name]);
      const iframe = document.getElementById('repl');
      iframe.src = 'https://strudel.cc/#' + encoded;
    }

    // Load default
    loadPreset('deephouse');
  </script>
</body>
</html>
